<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sheets - Retropixel Office™</title>

<style>
body {
  margin: 0;
  font-family: Segoe UI, sans-serif;
  background: #f5f5f5;
}

/* topo */
.topbar {
  background: linear-gradient(#4caf50, #1b5e20);
  color: white;
  padding: 8px 12px;
  font-weight: bold;
}

/* toolbar */
.toolbar {
  background: linear-gradient(#a5d6a7, #2e7d32);
  padding: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.toolbar button {
  padding: 6px;
  border: none;
  border-radius: 4px;
  background: white;
  cursor: pointer;
}

.toolbar button:hover {
  background: #eee;
}

/* tabela */
table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px;
  min-width: 80px;
  text-align: left;
}

td {
  background: white;
}

td:focus {
  outline: 2px solid #4caf50;
}
</style>
</head>

<body>

<div class="topbar">
  📊 <span id="tituloArquivo">Sem título.rshe</span>
</div>

<div class="toolbar">
  <button onclick="novo()">Novo</button>
  <button onclick="salvar()">💾 Salvar</button>
  <button onclick="salvarComo()">Salvar como</button>
  <button onclick="abrir()">Abrir</button>
</div>

<table id="planilha"></table>

<script>
let dados = [];
let fileHandle = null;
let nomeArquivo = "Sem título";

const linhas = 20;
const colunas = 10;

/* ===== INIT ===== */

function novo() {
  dados = Array.from({ length: linhas }, () => Array(colunas).fill(""));
  fileHandle = null;
  nomeArquivo = "Sem título";
  render();
}

/* ===== RENDER ===== */

function render() {
  const tabela = document.getElementById("planilha");
  tabela.innerHTML = "";

  let header = "<tr><th></th>";
  for (let c = 0; c < colunas; c++)
    header += "<th>" + String.fromCharCode(65 + c) + "</th>";
  header += "</tr>";
  tabela.innerHTML += header;

  for (let i = 0; i < linhas; i++) {
    let row = "<tr><th>" + (i + 1) + "</th>";

    for (let j = 0; j < colunas; j++) {
      const valor = calcular(dados[i][j]);

      row += `<td contenteditable="true"
        onfocus="editarModo(this, ${i}, ${j})"
        onblur="salvarCelula(this, ${i}, ${j})">
        ${valor}
      </td>`;
    }

    row += "</tr>";
    tabela.innerHTML += row;
  }

  atualizarTitulo();
}

/* ===== EDIÇÃO ===== */

// mostra fórmula original ao clicar
function editarModo(el, i, j) {
  el.innerText = dados[i][j];
}

// salva ao sair da célula
function salvarCelula(el, i, j) {
  dados[i][j] = el.innerText;
  render();
}

/* ===== FÓRMULAS ===== */

function calcular(valor) {
  if (!valor || valor[0] !== "=") return valor;

  try {
    let expr = valor.substring(1);

    expr = expr.replace(/[A-Z][0-9]+/g, ref => {
      const col = ref.charCodeAt(0) - 65;
      const row = parseInt(ref.substring(1)) - 1;

      const val = dados[row]?.[col] || 0;
      return parseFloat(val) || 0;
    });

    return eval(expr);
  } catch {
    return "ERR";
  }
}

/* ===== SALVAR ===== */

async function salvar() {
  const conteudo = JSON.stringify({
    tipo: "sheets",
    versao: 2,
    nome: nomeArquivo,
    dados
  });

  if ('showSaveFilePicker' in window) {
    try {
      if (!fileHandle) return salvarComo();

      const w = await fileHandle.createWritable();
      await w.write(conteudo);
      await w.close();
    } catch (e) { console.log(e); }

  } else {
    downloadArquivo(conteudo, nomeArquivo + ".rshe");
  }
}

/* ===== SALVAR COMO ===== */

async function salvarComo() {
  if ('showSaveFilePicker' in window) {
    try {
      fileHandle = await window.showSaveFilePicker({
        suggestedName: "planilha.rshe",
        types: [{
          accept: { "application/json": [".rshe"] }
        }]
      });

      nomeArquivo = fileHandle.name.replace(".rshe", "");
      await salvar();

    } catch (e) { console.log(e); }

  } else {
    const nome = prompt("Nome do arquivo:", nomeArquivo);
    if (!nome) return;

    nomeArquivo = nome;
    salvar();
  }
}

/* ===== ABRIR ===== */

async function abrir() {
  if ('showOpenFilePicker' in window) {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{
          accept: { "application/json": [".rshe"] }
        }]
      });

      fileHandle = handle;

      const file = await handle.getFile();
      const data = JSON.parse(await file.text());

      if (data.tipo !== "sheets") return alert("Arquivo inválido!");

      dados = data.dados || [];
      nomeArquivo = data.nome || "Sem título";

      render();

    } catch (e) { console.log(e); }

  } else {
    abrirFallback(".rshe", (data) => {
      dados = data.dados || [];
      nomeArquivo = data.nome || "Sem título";
      render();
    });
  }
}

/* ===== UI ===== */

function atualizarTitulo() {
  document.getElementById("tituloArquivo").innerText = nomeArquivo + ".rshe";
}

/* ===== HELPERS ===== */

function downloadArquivo(conteudo, nome) {
  const blob = new Blob([conteudo], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = nome;
  a.click();
}

function abrirFallback(ext, callback) {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ext;

  input.onchange = e => {
    const reader = new FileReader();
    reader.onload = () => callback(JSON.parse(reader.result));
    reader.readAsText(e.target.files[0]);
  };

  input.click();
}

/* INIT */
novo();
</script>

</body>
</html>
