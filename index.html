<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Retropixel Office™</title>

<style>
body {
  margin: 0;
  font-family: Segoe UI, sans-serif;
  background: white;
}

/* telas */
.screen {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.hidden {
  display: none;
}

/* login */
.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
}

.login-box {
  background: #f3f3f3;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
  text-align: center;
}

.login-box input {
  padding: 10px;
  width: 220px;
  margin-top: 10px;
}

/* botão com ícone */
.btn {
  margin-top: 15px;
  padding: 10px 15px;
  background: linear-gradient(#4da3ff, #1c6ed5);
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn img {
  width: 16px;
  height: 16px;
}

/* TOPBAR */
.topbar {
  background: linear-gradient(#e3f2fd, #90caf9);
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

.menu {
  display: flex;
  gap: 15px;
}

.menu span {
  cursor: pointer;
}

.menu span:hover {
  text-decoration: underline;
}

/* CONTEÚDO */
.content {
  flex: 1;
  padding: 30px;
}

#welcome {
  font-size: 22px;
  margin-bottom: 20px;
}

/* apps */
.apps {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
}

.app {
  width: 140px;
  height: 140px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: 0.2s;
  color: white;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.app img {
  width: 56px;
  height: 56px;
  margin-bottom: 10px;
}

.app:hover {
  transform: scale(1.08);
}

/* cores */
.write { background: linear-gradient(#ffd54d, #e6a800); }
.sheets { background: linear-gradient(#66bb6a, #2e7d32); }
.slides { background: linear-gradient(#ff6b6b, #c62828); }
.tasks { background: linear-gradient(#dce0e3, #8e9faf); }

/* extras */
.extra {
  margin-top: 40px;
}

.extra h3 {
  margin-bottom: 10px;
}

.extra button {
  padding: 8px 12px;
  margin-right: 10px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.extra img {
  width: 14px;
  height: 14px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen">
  <div class="login-container">
    <div class="login-box">
      <h1>Retropixel Office™</h1>
      <input type="text" id="username" placeholder="Digite seu nome...">
      <br>

      <button class="btn" onclick="entrar()">
        <img src="icons/entrar.png">
        Entrar
      </button>

    </div>
  </div>
</div>

<!-- HUB -->
<div id="hubScreen" class="screen hidden">

  <div class="topbar">
    <div class="logo">Retropixel Office™</div>

    <div class="menu">
      <span onclick="novoArquivo()">Novo</span>
      <span onclick="abrirArquivo()">Abrir</span>
      <span onclick="sair()">Sair</span>
    </div>
  </div>

  <div class="content">

    <div id="welcome"></div>

    <div class="apps">
      <div class="app write" onclick="abrirApp('write')">
        <img src="icons/write.png">
        <span>Write</span>
      </div>

      <div class="app sheets" onclick="abrirApp('sheets')">
        <img src="icons/sheets.png">
        <span>Sheets</span>
      </div>

      <div class="app slides" onclick="abrirApp('slides')">
        <img src="icons/slides.png">
        <span>Slides</span>
      </div>

      <div class="app tasks" onclick="abrirApp('tasks')">
        <img src="icons/tasks.png">
        <span>Tasks</span>
      </div>
    </div>

    <div class="extra">
      <h3>Opções</h3>

      <button onclick="sobre()">Sobre</button>

      <button onclick="configuracoes()">
        <img src="icons/config.png">
        Configurações
      </button>
    </div>

  </div>
</div>

<script>
function entrar() {
  const nome = document.getElementById("username").value;

  if (!nome) {
    alert("Digite seu nome!");
    return;
  }

  localStorage.setItem("usuario", nome);
  carregarHub();
}

function carregarHub() {
  const nome = localStorage.getItem("usuario");

  if (!nome) return;

  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("hubScreen").classList.remove("hidden");

  document.getElementById("welcome").innerText = "Olá, " + nome + ".";
}

function abrirApp(app) {
  window.location.href = app + "/index.html";
}

function novoArquivo() {
  alert("Abra um aplicativo para criar um novo arquivo.");
}

function abrirArquivo() {
  alert("Abra um aplicativo e utilize a opção 'Abrir'.");
}

function sair() {
  localStorage.removeItem("usuario");
  location.reload();
}

function sobre() {
  alert("Retropixel Office™\n\nPacote de aplicativos focado em simplicidade, desempenho e experiência de uso.\n\nArquivos são armazenados localmente no dispositivo do usuário.");
}

function configuracoes() {
  alert("Configurações ainda não disponíveis nesta versão.");
}

window.onload = carregarHub;
</script>

</body>
</html>
